 
  
  <nav class="sticky top-0 z-40 w-full border-b border-gray-100 bg-white px-6 py-4 font-sans">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-4">
    <!-- logo  -->
    <a class="shrink-0">
      <img
        src="/assets/fresh-logo.svg"
        alt="FreshCart"
        class="h-7 md:h-8"
      />
    </a>

    <!-- input search  -->
    <div class="hidden lg:block grow max-w-md">

        <input

        />
        <button
          class="absolute right-1 top-1 bottom-1 flex w-9 items-center justify-center rounded-full bg-emerald-600 text-white transition-colors hover:bg-emerald-700"
        >
          <i class="fas fa-search text-xs"></i>
        </button>
      </div>
    </div>

    <!-- !---------------------------- links  !---------------------------- -->
    <div class="hidden items-center gap-6 md:flex">
      <a routerLink="/" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="text-green-700" class="font-medium text-gray-700 transition-colors hover:text-emerald-600">Home</a>
      <a routerLink="/shop" routerLinkActive="text-green-700"class="font-medium text-gray-700 transition-colors hover:text-emerald-600">Shop</a>
      <div class="group relative">
        <button
          class="flex items-center gap-1 py-2 font-medium text-gray-700 transition-colors group-hover:text-emerald-600"
        >
          Categories
          <i class="fas fa-chevron-down text-2xs transition-transform group-hover:rotate-180"></i>
        </button>
        <div
          class="invisible absolute left-0 z-50 mt-0 w-48 rounded-lg border border-gray-100 bg-white opacity-0 shadow-xl transition-all duration-200 group-hover:visible group-hover:opacity-100"
        >
          <ul class="py-2 text-sm text-gray-700">
            <li>
              <a routerLink="/categories" routerLinkActive="text-green-700" class="block px-4 py-2 hover:bg-emerald-50 hover:text-emerald-600"
                >All Categories</a
              >
            </li>
            @for (category of categoriesList(); track category._id) {
           <li>
           <a
             routerLink="/shop"
             [queryParams]="{ category: category._id, slug: category.slug }"
             class="block px-4 py-2 hover:bg-emerald-50 hover:text-emerald-600"
              >
             {{ category.name }}
             </a>
            </li>
            }
          </ul>
        </div>
      </div>
      <a routerLink="/brands" routerLinkActive="text-green-700" class="font-medium text-gray-700 transition-colors hover:text-emerald-600">Brands</a>
    </div>

    <!-- ? --------------- ICONS  & signin ? ---------------  -->
    <div class="flex items-center gap-2 md:gap-4">
      <button
        class="flex h-10 w-10 items-center justify-center rounded-full text-gray-600 transition-all hover:bg-gray-100 lg:hidden"
      >
        <i class="fas fa-search text-lg"></i>
      </button>
      <button
      routerLink="/wishlist" routerLinkActive="text-green-700"
        class="relative flex h-10 w-10 items-center justify-center rounded-full text-gray-600 transition-all hover:bg-gray-100 hover:text-emerald-600"
      >
        <i class="far fa-heart text-xl"></i>
      </button>
      <button
      routerLink="/cart" routerLinkActive="text-green-700"
        class="relative flex h-10 w-10 items-center justify-center rounded-full text-gray-600 transition-all hover:bg-gray-100 hover:text-emerald-600"
      >
        <i class="fas fa-shopping-cart text-xl"></i>
        <span
          class="absolute right-1 top-1 rounded-full border-2 border-white bg-emerald-600 px-1.5 text-2xs font-bold text-white"
          >{{count()}}</span
        >
      </button>

      <div class="hidden sm:flex items-center gap-4 pl-2 md:border-l md:border-gray-200 md:pl-4">
       @if (logged()) {
         <button
         (click)="logOut()"
          class="flex items-center gap-2 font-medium text-gray-700 transition-colors hover:text-emerald-600"
        >
           SignOut
        </button>
       } @else {
         <a
        routerLink="/login" routerLinkActive="text-green-700"
          class="flex items-center gap-2 font-medium text-gray-700 transition-colors hover:text-emerald-600"
        >
          <i class="far fa-user text-lg"></i> Sign In
        </a>
        <a
        routerLink="/register" routerLinkActive="text-green-700"
          class="flex items-center gap-2 font-medium text-gray-700 transition-colors hover:text-emerald-600"
        >
          <i class="fas fa-user-plus text-lg"></i> Sign Up
        </a>
       }
      </div>

      <!-- dropdown when login -->

      <!-- bars button  -->
      <button
        type="button"
        data-drawer-target="drawer-right"
        data-drawer-show="drawer-right"
        data-drawer-placement="right"
        class="p-2 text-gray-600 hover:text-emerald-600 md:hidden focus:outline-none transition-colors"
      >
        <i class="fas fa-bars text-2xl"></i>
      </button>
    </div>
  </div>
</nav>
