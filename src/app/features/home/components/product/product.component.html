<section class="py-10">
    <div class="container">
        <h2 class="text-3xl font-semibold">Featured <span class="text-primary">Products</span></h2>
        <div class="mt-5 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 lx:grid-col-5 gap-4">
         @for(product of productList(); track product._id){
          <app-card [product]="product"/>
            }
        </div>
    </div>
</section>
