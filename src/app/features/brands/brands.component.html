<div class="min-h-screen bg-gray-50/50">
    <div class="bg-gradient bg-purple-500 text-white py-10">
        <div class="container mx-auto px-4 py-12 sm:py-16">
            <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
                <a 
                routerLink="/"
                class="hover:text-primary-600 transition-colors cursor-pointer">
                    Home
                </a>
                <span>/</span>
                <span class="text-white font-medium">Brands</span>
            </nav>
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30">
                    <i class="fa-solid fa-tags text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">
                        Top Brands
                    </h1>
                    <p class="text-white/80 mt-1">
                        Shop from your favorite brands
                    </p>
                </div>
            </div>
        </div>
    </div>
    <div class="container mx-auto px-4 py-10">
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 sm:gap-5">
            @for(item of brands(); track item._id){
             <a 
             [routerLink]="['/shop']"
             [queryParams]="{ brand: item._id, slug: item.slug }"
             class="group bg-white rounded-2xl border border-gray-100 p-4 sm:p-5 shadow-sm hover:shadow-xl hover:border-violet-200 transition-all duration-300 hover:-translate-y-1">
                <div class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-3 p-4 flex items-center justify-center">
                    <img
                    class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500"
                     [src]="item.image" 
                     [alt]="item.name"
                     >
                </div>
                <h3 class="font-semibold text-gray-900 text-center text-sm group-hover:text-violet-600 transition-colors truncate">
                    {{item.name}}
                </h3>
                <div class="flex justify-center mt-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="text-xs text-violet-600 flex items-center gap-1">View Products <i class="fa-solid fa-angle-right"></i></span>
                </div>
            </a>
            }
        </div>
    </div>
</div>
